name: Deploy MISMATHE site to GitHub Pages

# Publishes the static landing site in docs/ to GitHub Pages.
# Runs on every push to main, and can be triggered manually.

# NOTE: The simplest way to publish docs/ is GitHub's native "Deploy from a
# branch" mode (Settings -> Pages -> Source: Deploy from a branch -> main -> /docs).
# That requires no workflow at all. This workflow is kept as an optional
# "GitHub Actions" deploy path and is manual-only so it doesn't create failed
# runs when Pages is set to branch mode.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns on GitHub Pages for the repo automatically
        # so no manual dashboard toggle is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
